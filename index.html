<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kleiderspenden-Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Eigenes CSS -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- HEADER + Logo-->
    <header class="bg-primary text-white p-3">
        <div class="d-flex flex-column flex-md-row justify-content-center align-items-center text-center text-md-start">
            <div class="text-center me-3">
                <h1 class="mb-0">Kleiderspenden-Portal</h1>
                <p class="mb-0">Gemeinsam helfen</p>
            </div>
            <img src="images/logo.png" alt="Logo des Kleiderspenden-Portals" class="img-fluid mt-3 mt-md-0"
                style="max-height: 120px" />
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <!-- Burger Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Navigation umschalten">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation -->
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Kleider spenden</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Über uns</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Hilfsprojekte</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">FAQ</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="container py-4">
        <h2>Registrierung einer Kleiderspende</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="donationForm">
                    <!-- Übergabeart -->
                    <div class="mb-3">
                        <label class="form-label">Art der Übergabe</label>

                        <div class="d-grid gap-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery" value="office" required />
                                <label class="form-check-label">Übergabe an der Geschäftsstelle</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery" value="pickup" />
                                <label class="form-check-label">Abholung durch Sammelfahrzeug</label>
                            </div>
                        </div>
                    </div>

                    <!-- Adressfelder (nur bei Abholung sichtbar) -->
                    <div id="addressFields" style="display: none">
                        <div class="mb-3">
                            <label class="form-label">Straße und Hausnummer</label>
                            <input type="text" class="form-control" id="street" maxlength="100"
                                pattern="[A-Za-z0-9äöüÄÖÜß\s\-\.]+" />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Postleitzahl</label>
                            <input type="text" class="form-control" id="plz" pattern="[0-9]{5}" maxlength="5"
                                inputmode="numeric" />
                            <div id="plzWarning" class="alert alert-warning mt-2 d-none">
                                Die Geschäftsstelle befindet sich in Ihrer Nähe. Bitte geben
                                Sie Ihre Spende direkt dort ab.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ort</label>
                            <input type="text" class="form-control" id="city" maxlength="50"
                                pattern="[A-Za-zäöüÄÖÜß\s\-]+" />
                        </div>
                    </div>

                    <!-- Art der Kleidung -->
                    <div class="mb-3">
                        <label class="form-label">Art der Kleidung</label>
                        <select class="form-select" id="clothingType" required>
                            <option value="">Bitte auswählen</option>
                            <option>Jacken</option>
                            <option>Hosen</option>
                            <option>T-Shirts</option>
                            <option>Schuhe</option>
                            <option>Kinderkleidung</option>
                        </select>
                    </div>

                    <!-- Krisengebiet -->
                    <div class="mb-3">
                        <label class="form-label">Krisengebiet</label>
                        <select class="form-select" id="region" required>
                            <option value="">Bitte auswählen</option>
                            <option>Kleinbonum</option>
                            <option>Babaorum</option>
                            <option>Aquarium</option>
                            <option>Laudanum</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">
                        Spende registrieren
                    </button>
                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p>&copy; 2026 Kleiderspenden-Verein | Impressum | Datenschutz</p>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Eigenes JS -->
    <script src="script.js"></script>
</body>

</html>
