<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kleiderspenden-Portal</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Eigenes CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- HEADER -->
    <header class="bg-primary text-white text-center p-3">
        <h1>Kleiderspenden-Portal</h1>
        <p>Gemeinsam helfen вҖ“ weltweit</p>
    </header>

    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="#">Startseite</a>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="container py-4">
        <h2>Registrierung einer Kleiderspende</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="donationForm">

                    <!-- Гңbergabeart -->
                    <div class="mb-3">
                        <label class="form-label">Art der Гңbergabe</label>

                        <div class="d-grid gap-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery" value="office" required>
                                <label class="form-check-label">Гңbergabe an der GeschГӨftsstelle</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="delivery" value="pickup">
                                <label class="form-check-label">Abholung durch Sammelfahrzeug</label>
                            </div>
                        </div>
                    </div>

                    <!-- Adressfelder (nur bei Abholung sichtbar) -->
                    <div id="addressFields" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">StraГҹe und Hausnummer</label>
                            <input type="text" class="form-control" id="street" maxlength="100"
                                pattern="[A-Za-z0-9ГӨГ¶ГјГ„Г–ГңГҹ\s\-\.]+">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Postleitzahl</label>
                            <input type="text" class="form-control" id="plz" pattern="[0-9]{5}" maxlength="5"
                                inputmode="numeric">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ort</label>
                            <input type="text" class="form-control" id="city" maxlength="50"
                                pattern="[A-Za-zГӨГ¶ГјГ„Г–ГңГҹ\s\-]+">
                        </div>
                    </div>

                    <!-- Art der Kleidung -->
                    <div class="mb-3">
                        <label class="form-label">Art der Kleidung</label>
                        <select class="form-select" id="clothingType" required>
                            <option value="">Bitte auswГӨhlen</option>
                            <option>Jacken</option>
                            <option>Hosen</option>
                            <option>T-Shirts</option>
                            <option>Schuhe</option>
                            <option>Kinderkleidung</option>
                        </select>
                    </div>

                    <!-- Krisengebiet -->
                    <div class="mb-3">
                        <label class="form-label">Krisengebiet</label>
                        <select class="form-select" id="region" required>
                            <option value="">Bitte auswГӨhlen</option>
                            <option>Kleinbonum</option>
                            <option>Babaorum</option>
                            <option>Aquarium</option>
                            <option>Laudanum</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Spende registrieren</button>

                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center p-3 mt-4">
        <p>&copy; 2026 Kleiderspenden-Verein | Impressum | Datenschutz</p>
    </footer>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Eigenes JS -->
    <script src="script.js"></script>
</body>

</html>
