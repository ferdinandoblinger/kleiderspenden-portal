<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Bestätigung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

    <h2>Registrierung erfolgreich!</h2>

    <div class="card p-3 mt-3">
        <p><strong>Art der Kleidung:</strong> <span id="summaryClothing"></span></p>
        <p><strong>Krisengebiet:</strong> <span id="summaryRegion"></span></p>
        <p><strong>Datum:</strong> <span id="summaryDate"></span></p>
        <p><strong>Uhrzeit:</strong> <span id="summaryTime"></span></p>
        <p><strong>Ort:</strong> <span id="summaryLocation"></span></p>
    </div>
    <div class="mt-4 d-grid">
        <a href="index.html" class="btn btn-outline-secondary">
            Neue Spende registrieren
        </a>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            const data = JSON.parse(localStorage.getItem("donation"));

            $("#summaryClothing").text(data.clothingType);
            $("#summaryRegion").text(data.region);
            $("#summaryDate").text(data.date);
            $("#summaryTime").text(data.time);

            if (data.delivery === "pickup") {
                $("#summaryLocation").text(data.street + ", " + data.plz + " " + data.city);
            } else {
                $("#summaryLocation").text("Geschäftsstelle des Vereins");
            }
        });
    </script>

</body>

</html>
